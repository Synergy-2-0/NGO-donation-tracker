name: Promote staging → main on test→staging merge

# Trigger when a PR targeting `staging` is closed (we check it's merged and from `test`).
on:
  pull_request:
    types: [closed]
    branches: [staging]

permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  promote:
    name: Promote staging → main (only when PR merged from `test`)
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'test'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run tests (placeholder)
        run: |
          # Replace this with your real test command (e.g. `npm test` or `npm run test:integration`).
          echo "No tests configured in package.json — replace this step with your test command."
        working-directory: ./backend

      - name: Create PR from `staging` → `main` and merge (or enable auto-merge)
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'staging';
            const base = 'main';

            // 1) If staging is already in main (identical/behind), nothing to do.
            const compare = await github.rest.repos.compareCommits({ owner, repo, base, head });
            if (compare.data.status === 'identical' || compare.data.status === 'behind') {
              core.info(`Skip: staging is ${compare.data.status} relative to ${base}.`);
              return;
            }

            // 2) Look for an existing open PR from staging -> main
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${head}`, base, state: 'open' });
            let pr = prs.data.length ? prs.data[0] : null;

            if (!pr) {
              const created = await github.rest.pulls.create({ owner, repo, head, base,
                title: 'chore: promote staging → main',
                body: 'Automated promotion to `main` after successful tests on `staging`.',
                maintainer_can_modify: true
              });
              pr = created.data;
              core.info(`Created PR #${pr.number}`);
            } else {
              core.info(`Found existing PR #${pr.number}`);
            }

            // 3) Try to merge the PR now. If blocked, enable GitHub auto-merge for the PR.
            try {
              await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'merge' });
              core.info(`Merged PR #${pr.number} into ${base}`);
              return;
            } catch (err) {
              core.info(`Immediate merge failed/blocked: ${err.message}. Attempting to enable auto-merge...`);
            }

            // 4) Enable auto-merge (GraphQL). If this fails, the workflow will fail with a clear message.
            try {
              const mutation = `
                mutation ($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {pullRequestId: $pullRequestId, mergeMethod: MERGE}) {
                    pullRequest { id }
                  }
                }
              `;
              await github.graphql(mutation, { pullRequestId: pr.node_id });
              core.info(`Enabled auto-merge for PR #${pr.number}.`);
            } catch (err) {
              core.setFailed(`Could not merge PR #${pr.number} and enabling auto-merge failed: ${err.message}`);
            }
